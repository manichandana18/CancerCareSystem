<!DOCTYPE html>
<html lang="en">
<head>
    <title>CancerCare AI - Simple Auth Test</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --accent: #10b981;
            --light: #f9fafb;
            --dark: #111827;
            --border: #e5e7eb;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .logo i {
            font-size: 2.5em;
            color: white;
        }
        
        .title {
            font-size: 2em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: var(--border);
            font-size: 1em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--border);
        }
        
        .btn-secondary:hover {
            border-color: var(--secondary);
            color: var(--secondary);
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: var(--border);
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
        }
        
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
        }
        
        .message {
            background: var(--light);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            display: none;
        }
        
        .message.success {
            border-left-color: var(--accent);
            color: var(--accent);
        }
        
        .message.error {
            border-left-color: var(--danger);
            color: var(--danger);
        }
        
        .otp-container {
            display: none;
            margin-bottom: 20px;
        }
        
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .otp-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 1.5em;
            font-weight: 600;
            border: 2px solid var(--border);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .otp-input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-hospital"></i>
            </div>
            <h1 class="title">CancerCare AI</h1>
            <p class="subtitle">Advanced Cancer Detection & Support</p>
        </div>
        
        <div id="message" class="message"></div>
        
        <div id="signupForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a strong password">
            </div>
            
            <button class="btn" onclick="testInput()">Test Input</button>
            <button class="btn btn-secondary" onclick="sendOTP()">Send OTP</button>
        </div>
        
        <div id="otpContainer" class="otp-container">
            <p style="text-align: center; margin-bottom: 15px; color: var(--dark);">
                Enter the 6-digit code sent to your email:
            </p>
            <div class="otp-inputs">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 0)">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 1)">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 2)">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 3)">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 4)">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 5)">
            </div>
            <button class="btn" onclick="verifyOTP()">Verify OTP</button>
        </div>
        
        <div class="divider">
            <span>Or</span>
        </div>
        
        <button class="btn btn-secondary" onclick="testBackend()">Test Backend Connection</button>
    </div>
    
    <script>
        let currentUser = {};
        
        function showMessage(text, type = 'success') {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        function testInput() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            console.log('Email:', email);
            console.log('Password:', password);
            
            if (!email || !password) {
                showMessage('Please fill in both email and password', 'error');
                return;
            }
            
            showMessage('Input working! Email: ' + email + ', Password length: ' + password.length, 'success');
        }
        
        function sendOTP() {
            const email = document.getElementById('email').value;
            
            if (!email) {
                showMessage('Please enter email first', 'error');
                return;
            }
            
            // Simulate OTP sending
            showMessage('OTP sent to ' + email + '! Check your inbox.', 'success');
            
            // Show OTP container
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('otpContainer').style.display = 'block';
            
            // Focus first OTP input
            document.querySelector('.otp-input').focus();
        }
        
        function moveToNext(input, index) {
            if (input.value.length === 1) {
                const inputs = document.querySelectorAll('.otp-input');
                if (index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            }
        }
        
        function verifyOTP() {
            const inputs = document.querySelectorAll('.otp-input');
            const otp = Array.from(inputs).map(input => input.value).join('');
            
            console.log('OTP entered:', otp);
            
            if (otp.length !== 6) {
                showMessage('Please enter all 6 digits', 'error');
                return;
            }
            
            showMessage('OTP verified! Welcome to CancerCare AI!', 'success');
            
            // Simulate successful verification
            setTimeout(() => {
                showMessage('Login successful! Redirecting to dashboard...', 'success');
            }, 2000);
        }
        
        async function testBackend() {
            try {
                const response = await fetch('http://localhost:5001/health');
                const result = await response.json();
                
                if (result.status === 'healthy') {
                    showMessage('Backend connection successful!', 'success');
                } else {
                    showMessage('Backend not responding correctly', 'error');
                }
            } catch (error) {
                showMessage('Cannot connect to backend. Is server running?', 'error');
                console.error('Backend error:', error);
            }
        }
        
        // Auto-focus first input on load
        window.onload = function() {
            document.getElementById('email').focus();
            console.log('Simple Auth Test loaded successfully!');
        };
    </script>
</body>
</html>
