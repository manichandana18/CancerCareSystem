# Render Blueprint — CancerCareSystem
# Deploy: https://render.com/deploy → connect GitHub repo → auto-detects this file

services:
  # ── Backend (FastAPI + ML) ──
  - type: web
    name: cancercare-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CORS_ORIGINS
        sync: false  # Set after frontend deploys

  # ── Frontend (Static Site) ──
  - type: web
    name: cancercare-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to backend URL after backend deploys
