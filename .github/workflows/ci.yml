name: CancerCareSystem CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Checks ──
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn httpx pytest

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ --exit-zero

      - name: Start backend and health check
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 5
          curl -f http://127.0.0.1:8000/health || exit 1
          echo "✅ Backend health check passed"

  # ── Frontend Checks ──
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0 || true

      - name: Build
        env:
          VITE_API_URL: ""
        run: npm run build

      - name: Verify build output
        run: |
          test -d dist && echo "✅ Build output exists" || exit 1
          test -f dist/index.html && echo "✅ index.html exists" || exit 1
