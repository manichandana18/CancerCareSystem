server {
    listen 80;
    server_name localhost;

    # Serve static frontend files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File upload support (large medical images)
        client_max_body_size 50M;
        proxy_read_timeout 120s;
    }

    # Proxy prediction endpoints
    location /predict/ {
        proxy_pass http://backend:8000/predict/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        client_max_body_size 50M;
        proxy_read_timeout 120s;
    }

    # Proxy auto-predict endpoint
    location /auto-predict {
        proxy_pass http://backend:8000/auto-predict;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        client_max_body_size 50M;
        proxy_read_timeout 120s;
    }

    # Proxy health check
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # Proxy backend root (status)
    location = /backend-status {
        proxy_pass http://backend:8000/;
    }

    # SPA routing: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
